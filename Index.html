<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>IPL Live Score</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
    }
    h1 {
      color: #facc15;
    }
    .card {
      background: #1e293b;
      margin: 20px auto;
      padding: 20px;
      border-radius: 10px;
      width: 80%;
    }
  </style>
</head>
<body>

<h1>🏏 IPL Live Score</h1>
<div id="matches"></div>

<script>
const API_KEY = "YOUR_API_KEY"; // CricAPI key डालना
const URL = `https://api.cricapi.com/v1/currentMatches?apikey=${API_KEY}&offset=0`;

async function getMatches() {
  const res = await fetch(URL);
  const data = await res.json();

  const container = document.getElementById("matches");
  container.innerHTML = "";

  data.data.forEach(match => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <h2>${match.name}</h2>
      <p>Status: ${match.status}</p>
      <p>Score: ${match.score?.[0]?.r || "-"} / ${match.score?.[0]?.w || "-"} (${match.score?.[0]?.o || "-"})</p>
    `;

    container.appendChild(div);
  });
}

getMatches();
setInterval(getMatches, 30000); // 30 sec auto refresh
</script>

</body>
</html>
